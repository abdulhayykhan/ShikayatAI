steps:
  # ============================================================================
  # 1. BACKEND (FastAPI API)
  # ============================================================================
  # Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/shikayatai-backend:$COMMIT_SHA', '.']

  # Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/shikayatai-backend:$COMMIT_SHA']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'shikayatai-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/shikayatai-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-secrets=GOOGLE_API_KEY=shikayatai-google-api-key:latest'

  # ============================================================================
  # 2. FRONTEND (Next.js App)
  # ============================================================================
  # Build Frontend Image
  # We pass NEXT_PUBLIC_API_URL dynamically so the container knows where the backend is
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'frontend'
    args: 
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL'
      - '-t'
      - 'gcr.io/$PROJECT_ID/shikayatai-frontend:$COMMIT_SHA'
      - '.'

  # Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/shikayatai-frontend:$COMMIT_SHA']

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'shikayatai-web'
      - '--image'
      - 'gcr.io/$PROJECT_ID/shikayatai-frontend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/shikayatai-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/shikayatai-frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

# Require user to supply the API URL when manually running Cloud Build
substitutions:
  _NEXT_PUBLIC_API_URL: 'https://shikayatai-api-replace-this.run.app'
